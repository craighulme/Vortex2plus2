<!DOCTYPE html>
<html lang="en">

<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex 2+2</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="three.min.js" type="module"></script>
    <script src="inflate.min.js"></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
    <div id="scene"></div>
    <div id="crosshair"></div>
    <div id="cursor"></div>
    <div id="overlay"><span>Click to play</span></div>

    <div id="lb-player-panel" style="display:none">
        <div class="lbp-name" id="lbp-name"></div>
        <button class="lbp-btn" id="lbp-action-btn"></button>
        <button class="lbp-btn" id="lbp-follow-btn"></button>
        <a class="lbp-profile" id="lbp-profile-link" href="#" target="_blank">View Profile →</a>
    </div>

    <div id="settings-panel" style="display:none">
        <div class="sp-title">Settings</div>
        <div class="sp-row">
            <span class="sp-label">Camera Sensitivity</span>
            <input type="range" id="sp-sens" min="0.1" max="3" step="0.05" value="1">
            <span class="sp-val" id="sp-sens-val">1.0x</span>
        </div>
    </div>

    <div id="leaderboard">
        <div class="lb-panel">
            <div class="lb-header">
                <span class="lb-title">Players</span>
                <div class="lb-col-headers" id="lb-col-headers"></div>
            </div>
            <div class="lb-body" id="lb-body"></div>
        </div>
    </div>

    <div id="hud">
        <div id="hud-topbar">
            <button class="hud-btn" id="settings-btn" title="Settings">
                <i class="fa-solid fa-gear"></i>
            </button>
            <button class="hud-btn" id="chat-toggle-btn" title="Chat">
                <i class="fa-solid fa-message"></i>
                <span id="unread-badge" class="hidden">0</span>
            </button>
        </div>
        <div id="chat-window">
            <div id="chat-messages"></div>
            <div id="chat-input-row">
                <div id="chat-input" tabindex="-1"><span class="chat-placeholder">Click or press / to chat</span></div>
                <button id="chat-send">Send</button>
            </div>
        </div>
    </div>

    <div id="notif-container"></div>

    <div id="purchase-modal"
        style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;width:200px;background:rgba(18,18,26,0.95);border-radius:8px;padding:14px;font-family:system-ui,sans-serif;color:#fff;">
        <div id="pm-name" style="font-size:13px;font-weight:700;margin-bottom:2px;"></div>
        <div id="pm-price" style="font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:12px;"></div>
        <div style="display:flex;gap:6px;">
            <button id="pm-cancel"
                style="flex:1;padding:7px 0;border:none;border-radius:6px;background:rgba(255,255,255,0.08);color:#fff;font-size:12px;cursor:pointer;">Cancel</button>
            <button id="pm-get"
                style="flex:1;padding:7px 0;border:none;border-radius:6px;background:#2563EB;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">Get</button>
        </div>
    </div>

    <script src="avatar.js"></script>
    <script src="vortex-engine.js" type="module"></script>
    <script src="parts.js"></script>
    <script src="inline_1.js"></script>
    <script src="leaderboard.js"></script>
    <script src="multiplayer.js"></script>
    <script src="chat.js"></script>
    <script src="notifications.js"></script>
</body>

</html>
